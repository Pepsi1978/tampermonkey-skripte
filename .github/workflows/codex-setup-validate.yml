name: Codex Setup Validate

on:
  push:
    branches: ["main"]
    paths:
      - "AGENTS.md"
      - "codex-setup/**"
      - ".github/workflows/codex-setup-validate.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "AGENTS.md"
      - "codex-setup/**"
      - ".github/workflows/codex-setup-validate.yml"
  workflow_dispatch:

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate codex-setup on Unix
        if: runner.os != 'Windows'
        run: bash codex-setup/scripts/validate-codex-setup.sh

      - name: Validate codex-setup on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh -NoProfile -File codex-setup/scripts/validate-codex-setup.ps1
